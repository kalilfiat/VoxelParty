<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MeshMosh — Studio Blockout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/topbar.css">
  <link rel="stylesheet" href="styles/toolbar.css">
  <link rel="stylesheet" href="styles/viewport.css">
  <link rel="stylesheet" href="styles/panels.css">
</head>
<body>

<div id="app">

  <!-- ═══════════════════════════════ TOP BAR ═══════════════════════════════ -->
  <header id="topbar">

    <!-- Logo -->
    <a class="topbar-logo" href="#">
      <div class="logo-mark">M</div>
      <span class="logo-text">Mesh<span>Mosh</span></span>
    </a>

    <div class="topbar-sep"></div>

    <!-- Room info -->
    <div class="room-info">
      <span class="room-path">Room /</span>
      <span class="room-name">Studio Blockout</span>
    </div>

    <div class="topbar-sep"></div>

    <!-- Connection status -->
    <div class="conn-status connected" id="conn-status">
      <div class="conn-status-dot"></div>
      Connected
    </div>

    <div class="topbar-sep"></div>

    <!-- Connected users stack -->
    <div class="user-stack" title="3 users in room">
      <div class="avatar" style="background:#00d4ff20;color:#00d4ff;border:2px solid var(--bg-panel)">AT</div>
      <div class="avatar" style="background:#8b5cf620;color:#8b5cf6;border:2px solid var(--bg-panel)">LV</div>
      <div class="avatar" style="background:#e879f920;color:#e879f9;border:2px solid var(--bg-panel)">MC</div>
    </div>
    <span style="font-size:var(--text-xs);color:var(--text-muted);margin-left:4px">3 online</span>

    <!-- Right actions -->
    <div class="topbar-right">
      <button class="topbar-btn primary" id="btn-share">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="4" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="4" cy="8" r="2"/>
          <path d="M10 4.8L6 7.2M6 8.8l4 2.4"/>
        </svg>
        Share room
      </button>
      <button class="icon-btn" id="btn-settings" title="Settings">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/>
        </svg>
      </button>
      <button class="icon-btn" title="Help">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="6.5"/>
          <path d="M6 6.5a2 2 0 013.9.7C9.9 8.4 8 9 8 10M8 12.5v.5"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════ TOOLBAR ═══════════════════════════════ -->
  <nav id="toolbar">
    <!-- Rendered by JS -->
  </nav>

  <!-- ═══════════════════════════════ SCENE PANEL ═══════════════════════════ -->
  <aside id="panel-scene">

    <!-- Objects section -->
    <div class="panel-header">
      <span class="label-xs">Scene</span>
      <button class="icon-btn" title="Add object" onclick="document.querySelector('[data-tool=add-cube]').click()">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
      </button>
    </div>
    <div class="panel-body" id="scene-list">
      <!-- Rendered by JS -->
    </div>

    <!-- Users section (compact) -->
    <div style="border-top:1px solid var(--border-subtle);flex-shrink:0">
      <div class="panel-header" style="min-height:32px">
        <span class="label-xs">Collaborators</span>
        <span class="users-header-stat"><strong>3</strong> editing</span>
      </div>
      <div id="users-list" style="max-height:130px;overflow-y:auto">
        <!-- Rendered by JS -->
      </div>
    </div>

    <!-- Activity feed -->
    <div style="border-top:1px solid var(--border-subtle);flex-shrink:0">
      <div class="panel-header" style="min-height:32px">
        <span class="label-xs">Activity</span>
      </div>
      <div id="activity-feed" class="activity-feed" style="max-height:120px;overflow-y:auto">
        <!-- Rendered by JS -->
      </div>
    </div>

  </aside>

  <!-- ═══════════════════════════════ VIEWPORT ══════════════════════════════ -->
  <main id="viewport">

    <div id="viewport-canvas">

      <!-- Camera / view info overlay -->
      <div id="vp-cam-info">
        CAM  <span>Perspective</span><br>
        FOV  <span>60°</span><br>
        NEAR <span>0.1</span>  FAR <span>1000</span>
      </div>

      <!-- Axis gizmo -->
      <div id="axis-gizmo">
        <svg viewBox="0 0 48 48" fill="none">
          <!-- Z axis (blue, coming toward viewer) -->
          <line x1="24" y1="24" x2="24" y2="8" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
          <polygon points="24,4 21,10 27,10" fill="#60a5fa"/>
          <text x="24" y="2" text-anchor="middle" font-size="6" fill="#60a5fa" font-family="JetBrains Mono">Z</text>
          <!-- X axis (red) -->
          <line x1="24" y1="24" x2="40" y2="32" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
          <polygon points="44,34 38,28 36,35" fill="#f87171"/>
          <text x="46" y="37" text-anchor="middle" font-size="6" fill="#f87171" font-family="JetBrains Mono">X</text>
          <!-- Y axis (green) -->
          <line x1="24" y1="24" x2="8" y2="32" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
          <polygon points="4,34 10,28 12,35" fill="#4ade80"/>
          <text x="2" y="37" text-anchor="middle" font-size="6" fill="#4ade80" font-family="JetBrains Mono">Y</text>
          <!-- Center dot -->
          <circle cx="24" cy="24" r="3" fill="var(--bg-elevated)" stroke="var(--border-strong)" stroke-width="1"/>
        </svg>
      </div>

      <!-- ── Mock 3D objects ── -->

      <!-- Blockout wall (back) -->
      <div class="mock-object mock-wall" id="mock-wall" data-obj-id="blockout_wall_a"
           style="bottom:28%; left:50%; transform:translateX(-50%) perspective(400px) rotateX(20deg);">
      </div>

      <!-- Cube (selected by default) -->
      <div class="mock-object mock-cube selected" id="mock-cube" data-obj-id="cube_01"
           style="bottom:32%; left:42%;">
        <div class="selection-label">Cube_01</div>
        <!-- Mock gizmo arrows for selected -->
        <svg class="gizmo-overlay" style="position:absolute;top:-60px;left:-20px;width:140px;height:140px;pointer-events:none" viewBox="0 0 140 140" fill="none">
          <!-- Y up -->
          <line x1="70" y1="80" x2="70" y2="20" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="none"/>
          <polygon points="70,14 66,22 74,22" fill="#4ade80"/>
          <!-- X right -->
          <line x1="70" y1="80" x2="120" y2="80" stroke="#f87171" stroke-width="1.5"/>
          <polygon points="126,80 118,76 118,84" fill="#f87171"/>
          <!-- Z forward -->
          <line x1="70" y1="80" x2="30" y2="110" stroke="#60a5fa" stroke-width="1.5"/>
          <polygon points="26,114 30,105 38,109" fill="#60a5fa"/>
        </svg>
      </div>

      <!-- Sphere -->
      <div class="mock-object mock-sphere" id="mock-sphere" data-obj-id="sphere_01"
           style="bottom:35%; right:32%;">
      </div>

      <!-- User cursor: Ana -->
      <div class="user-cursor" style="top:38%; left:48%; color:#00d4ff">
        <div class="user-cursor-dot"></div>
        <div class="user-cursor-label">Ana</div>
      </div>
      <!-- User cursor: Leo -->
      <div class="user-cursor" style="top:55%; right:36%; color:#8b5cf6">
        <div class="user-cursor-dot"></div>
        <div class="user-cursor-label">Leo</div>
      </div>

    </div><!-- /viewport-canvas -->

    <!-- Selection info bar -->
    <div id="vp-selection-bar"><!-- Rendered by JS --></div>

    <!-- Viewport controls -->
    <div id="vp-controls">
      <div class="vp-control-group">
        <button class="vp-btn" title="Orbit">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 2C6 5 6 11 8 14M2 8c3-2 9-2 12 0"/></svg>
        </button>
        <button class="vp-btn" title="Pan">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v12M2 8h12M5 5L2 8l3 3M11 5l3 3-3 3"/></svg>
        </button>
        <button class="vp-btn" title="Zoom">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.5"/><path d="M11 11l3 3M7 5v4M5 7h4"/></svg>
        </button>
      </div>
      <div class="vp-control-group" style="font-family:var(--font-mono);font-size:9px;color:var(--text-muted);padding:4px 8px;gap:6px">
        <span title="Orbit">MMB</span>
        <span style="color:var(--border-strong)">·</span>
        <span title="Pan">Shift+MMB</span>
        <span style="color:var(--border-strong)">·</span>
        <span title="Zoom">Scroll</span>
      </div>
    </div>

  </main>

  <!-- ═══════════════════════════════ PROPERTIES PANEL ══════════════════════ -->
  <aside id="panel-props">
    <div class="panel-header">
      <span class="label-xs">Properties</span>
      <span id="props-obj-badge" style="font-size:var(--text-xs);color:var(--text-muted);font-family:var(--font-mono)">Mesh</span>
    </div>
    <div class="panel-body" id="props-content">
      <!-- Rendered by JS -->
    </div>
  </aside>

</div><!-- /app -->

<!-- ═══════════════════════════════════ OVERLAYS ════════════════════════════ -->

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Sync status indicator -->
<div id="sync-status">
  <div class="sync-spinner"></div>
  Syncing changes…
</div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/app.js"></script>
</body>
</html>
